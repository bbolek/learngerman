<!-- @dsCard group="Components" -->
<meta charset="utf-8">
<title>LernGerman — Buttons & Rating Bar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Nunito:wght@400;600;700;800&display=swap');
:root{--bg:#FBF7F0;--surface:#fff;--primary:#E8871E;--primary-dim:#FCE8D2;--accent:#2A9D8F;--danger:#E76F51;--ink:#2B2118;--muted:#8A7B6E;--line:#EFE7DB}
*{box-sizing:border-box;margin:0}
body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--ink);padding:32px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:28px;margin-bottom:24px}
h2{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:26px 0 12px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.btn{border:0;border-radius:12px;padding:14px 26px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 14px #e8871e55}
.btn-secondary{background:var(--primary-dim);color:#B05F06}
.btn-ghost{background:transparent;color:var(--primary);border:1.5px solid #E8871E66}
.btn-lg{padding:17px 32px;font-size:17px;border-radius:14px;width:100%;max-width:360px}
.btn:disabled{background:#EFE7DB;color:#B5A99C;box-shadow:none;cursor:default}
.rating{display:flex;gap:8px;max-width:420px}
.rate{flex:1;border:0;border-radius:12px;padding:12px 6px;font-family:inherit;cursor:pointer;text-align:center}
.rate b{display:block;font-size:15px;font-weight:800}
.rate span{font-size:11.5px;opacity:.75;font-weight:700}
.r-again{background:#FBE3DC;color:#C0492B}
.r-hard{background:#FCE8D2;color:#B05F06}
.r-good{background:#D8EEEB;color:#1D7269}
.r-easy{background:#E3EFDC;color:#4C7639}
.save{width:52px;height:52px;border-radius:999px;border:1.5px solid var(--line);background:var(--surface);font-size:22px;cursor:pointer;box-shadow:0 2px 8px #2b211812}
.save.on{background:#FBE3DC;border-color:#E76F51}
</style>
<h1>Buttons</h1>

<h2>Variants</h2>
<div class="row">
  <button class="btn btn-primary">Jetzt üben</button>
  <button class="btn btn-secondary">Alle Wörter</button>
  <button class="btn btn-ghost">Überspringen</button>
  <button class="btn btn-primary" disabled>Weiter</button>
</div>

<h2>Primary CTA (full width)</h2>
<button class="btn btn-primary btn-lg">12 Karten wiederholen →</button>

<h2>Flashcard rating bar — with next-interval preview</h2>
<div class="rating">
  <button class="rate r-again"><b>Nochmal</b><span>10 Min</span></button>
  <button class="rate r-hard"><b>Schwer</b><span>1 Tag</span></button>
  <button class="rate r-good"><b>Gut</b><span>3 Tage</span></button>
  <button class="rate r-easy"><b>Einfach</b><span>7 Tage</span></button>
</div>

<h2>Save word (idle / saved)</h2>
<div class="row">
  <button class="save">🤍</button>
  <button class="save on">❤️</button>
</div>
